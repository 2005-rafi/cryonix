name: cryonix
description: "Offline-first smart attendance tracker built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.3
  connectivity_plus: ^6.1.5
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.28.2
  drift_flutter: ^0.2.4
  fl_chart: ^1.1.1
  csv: ^6.0.0
  file_picker: ^10.3.3
  shared_preferences: ^2.5.3
  google_fonts: ^8.0.2
  uuid: ^4.5.1
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.0
  drift_dev: ^2.28.2
  flutter_launcher_icons: ^0.14.3
  fake_async: ^1.3.3
  drift_sqflite: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/chart_empty_state.json
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icons/ic_launcher.png'
  web:
    generate: true
    image_path: 'assets/icons/ic_launcher.png'
  windows:
    generate: true
    image_path: 'assets/icons/ic_launcher.png'
    icon_size: 256
  macos:
    generate: true
    image_path: 'assets/icons/ic_launcher.png'
